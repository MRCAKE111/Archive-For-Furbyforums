<!DOCTYPE html>

<head>
    <meta charset="UTF-8">
    <title>Furby Digital Archive</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <h1>Electronic Life Form Archive</h1>
        <form id="furbyForm">
            <input type="text" id="name" placeholder="Model Name (e.g. Wizard)" required>
            <input type="number" id="year" placeholder="Year" required>
            <select id="gen">
                <option value="Original">Original (1998)</option>
                <option value="2005">Emoto-Tronic (2005)</option>
                <option value="2012">Boom/Connect (2012)</option><input type="url">
              https://static.wikia.nocookie.net/official-furby/images/a/a6/1E2662875056900B10789D7DAD2A88FA-3.jpg/revision/latest?cb=20200322033307
</input type="url">
              <input type="url">
              https://static.wikia.nocookie.net/official-furby/images/5/53/Furbyboommanual_page-0001.jpg/revision/latest?cb=20200104133437
              </input type="url">
            </select>
            <button type="submit">Add to Collection</button>
        </form>
    </header>

    <main id="archiveGrid"></main>

    <script src="script.js"></script>
</body>
</html>
